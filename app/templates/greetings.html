<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Heyyo{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/imgs/gerapp_icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">  <title>Меню</title>
    <link rel="stylesheet" href="/static/styles/style.css">
    {% block styles %}
    <style>/* css двух видосов */
        html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000; /* Черный цвет, пока видео грузится */
        }

        /* Контейнер на весь экран */
        .video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        }

        /* Размытый задний фон */
        .video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover; /* Заполняет весь экран */
        filter: blur(20px) brightness(0.7); /* Размытие и небольшое затемнение */
        transform: scale(1.1); /* Убирает белые края из-за размытия */
        z-index: 1;
        }

        /* Основное видео по центру */
        .video-main {
        position: relative;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain; /* Сохраняет пропорции без обрезки */
        z-index: 2;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); /* Мягкая тень для отделения от фона */
        }
    </style>
    {% endblock %}

</head>
<body class="bg-dark text-white">
    <div class="video-container">
    <!-- фон -->
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="/static/videos/destr_unwmarked.mp4" type="video/mp4">
    </video>
    <!-- гиф -->
    <video class="video-main" autoplay loop muted playsinline controlslist="nodownload">
        <source src="/static/videos/destr_unwmarked.mp4" type="video/mp4">
    </video>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% block scripts %} 
    {% endblock %}
</body>
</html>
